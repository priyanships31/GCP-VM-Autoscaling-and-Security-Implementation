---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeInstance
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: gcp-vm-autoscaling-security
  labels:
    goog-ops-agent-policy: v2-x86-template-1-4-0
  name: web-server-vm
spec:
  bootDisk:
    autoDelete: true
    deviceName: web-server-vm
    initializeParams:
      size: 10
      sourceImageRef:
        external: https://www.googleapis.com/compute/beta/projects/debian-cloud/global/images/debian-12-bookworm-v20260210
      type: pd-balanced
    mode: READ_WRITE
    sourceDiskRef:
      external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/zones/us-central1-c/disks/web-server-vm
  confidentialInstanceConfig:
    enableConfidentialCompute: false
  machineType: e2-medium
  metadata:
  - key: enable-osconfig
    value: "TRUE"
  networkInterface:
  - accessConfig:
    - natIpRef:
        external: 34.44.42.254
      networkTier: PREMIUM
    name: nic0
    networkIpRef:
      external: 10.128.0.2
    networkRef:
      external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/global/networks/default
    stackType: IPV4_ONLY
    subnetworkProject: gcp-vm-autoscaling-security
    subnetworkRef:
      external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/regions/us-central1/subnetworks/default
  reservationAffinity:
    type: ANY_RESERVATION
  resourceID: web-server-vm
  scheduling:
    automaticRestart: true
    onHostMaintenance: MIGRATE
    provisioningModel: STANDARD
  serviceAccount:
    scopes:
    - https://www.googleapis.com/auth/devstorage.read_only
    - https://www.googleapis.com/auth/logging.write
    - https://www.googleapis.com/auth/monitoring.write
    - https://www.googleapis.com/auth/service.management.readonly
    - https://www.googleapis.com/auth/servicecontrol
    - https://www.googleapis.com/auth/trace.append
    serviceAccountRef:
      external: 314339520865-compute@developer.gserviceaccount.com
  shieldedInstanceConfig:
    enableIntegrityMonitoring: true
    enableVtpm: true
  tags:
  - http-server
  - ssh-access
  zone: us-central1-c
