---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeFirewall
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: gcp-vm-autoscaling-security
  name: default-allow-internal
spec:
  allow:
  - ports:
    - 0-65535
    protocol: tcp
  - ports:
    - 0-65535
    protocol: udp
  - protocol: icmp
  description: Allow internal traffic on the default network
  direction: INGRESS
  networkRef:
    external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/global/networks/default
  priority: 65534
  resourceID: default-allow-internal
  sourceRanges:
  - 10.128.0.0/9
