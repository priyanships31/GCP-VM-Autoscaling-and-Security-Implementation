---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeFirewall
metadata:
  annotations:
    cnrm.cloud.google.com/project-id: gcp-vm-autoscaling-security
  name: default-allow-icmp
spec:
  allow:
  - protocol: icmp
  description: Allow ICMP from anywhere
  direction: INGRESS
  disabled: true
  networkRef:
    external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/global/networks/default
  priority: 65534
  resourceID: default-allow-icmp
  sourceRanges:
  - 0.0.0.0/0
