---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeDisk
metadata:
  name: web-server-vm
spec:
  guestOsFeatures:
  - type: SEV_CAPABLE
  - type: SEV_LIVE_MIGRATABLE_V2
  - type: UEFI_COMPATIBLE
  - type: VIRTIO_SCSI_MULTIQUEUE
  - type: GVNIC
  imageRef:
    external: https://www.googleapis.com/compute/beta/projects/debian-cloud/global/images/debian-12-bookworm-v20260210
  licenses:
  - https://www.googleapis.com/compute/v1/projects/debian-cloud/global/licenses/debian-12-bookworm
  location: us-central1-c
  physicalBlockSizeBytes: 4096
  projectRef:
    external: gcp-vm-autoscaling-security
  resourceID: web-server-vm
  resourcePolicies:
  - external: https://www.googleapis.com/compute/v1/projects/gcp-vm-autoscaling-security/regions/us-central1/resourcePolicies/default-schedule-1
  size: 10
  type: pd-balanced
